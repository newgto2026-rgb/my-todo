name: Android CI

on:
  push:
    branches:
      - main
      - develop
      - refactor/**
      - feature/**
      - chore/**
      - fix/**
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-lint:
    name: Build, Unit Test, Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew --stacktrace testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --stacktrace assembleDebug

      - name: Compile androidTest sources
        run: ./gradlew --stacktrace :app:compileDebugAndroidTestKotlin

      - name: Attempt connected androidTest (UI)
        id: ui_instrumented
        timeout-minutes: 20
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 900
          emulator-options: >-
            -no-window
            -no-snapshot
            -no-boot-anim
            -gpu swiftshader_indirect
          disable-animations: true
          script: |
            set -euo pipefail
            adb wait-for-device
            timeout 240s bash -c '
              while true; do
                state="$(adb get-state 2>/dev/null || true)"
                if [[ "$state" != "device" ]]; then
                  adb reconnect offline >/dev/null 2>&1 || true
                  sleep 2
                  continue
                fi

                boot_completed="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r" || true)"
                if [[ "$boot_completed" == "1" ]]; then
                  break
                fi

                sleep 2
              done
            '

            set +e
            ./gradlew --stacktrace :app:connectedDebugAndroidTest
            test_status=$?
            set -e

            mkdir -p app/build/reports/androidTests
            adb shell getprop > app/build/reports/androidTests/device-props.txt || true
            adb logcat -d > app/build/reports/androidTests/logcat.txt || true
            adb shell dumpsys activity > app/build/reports/androidTests/dumpsys-activity.txt || true

            exit "$test_status"

      - name: Report UI test attempt result
        if: always()
        run: |
          if [ "${{ steps.ui_instrumented.outcome }}" = "success" ]; then
            echo "UI instrumented test attempt: success"
          else
            echo "UI instrumented test attempt: failed (non-blocking)"
          fi

      - name: Run strict lint (all variants)
        run: ./gradlew --stacktrace lint

      - name: Verify non-view coverage
        run: ./gradlew --stacktrace coverageVerifyAll

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
          if-no-files-found: warn

      - name: Upload emulator diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-diagnostics
          path: |
            app/build/reports/androidTests/logcat.txt
            app/build/reports/androidTests/device-props.txt
            app/build/reports/androidTests/dumpsys-activity.txt
          if-no-files-found: warn

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
            **/build/reports/lint-results*.sarif
          if-no-files-found: warn

      - name: Upload general build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/**
            **/build/outputs/logs/**
            **/build/reports/jacoco/**
          if-no-files-found: warn
