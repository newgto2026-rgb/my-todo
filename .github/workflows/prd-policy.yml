name: PRD Policy

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-prd:
    name: Validate PRD linkage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PRD policy
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          if [[ -z "${BRANCH_NAME:-}" ]]; then
            echo "::error::PR 컨텍스트에서 브랜치명을 읽지 못했습니다."
            exit 1
          fi

          case "$BRANCH_NAME" in
            main|master|release/*|hotfix/*|dependabot/*)
              echo "Exempt branch detected: $BRANCH_NAME"
              exit 0
              ;;
          esac

          git fetch --no-tags origin "$BASE_REF" --depth=1
          changed_files="$(git diff --name-only "origin/$BASE_REF...HEAD")"

          if [[ -z "$changed_files" ]]; then
            echo "No changed files."
            exit 0
          fi

          requires_prd=0
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              docs/*|*.md|.github/*|*/src/test/*|*/src/androidTest/*)
                ;;
              *)
                requires_prd=1
                break
                ;;
            esac
          done <<< "$changed_files"

          if [[ "$requires_prd" -eq 0 ]]; then
            echo "Only exempt file changes detected. Skip PRD enforcement."
            exit 0
          fi

          mapfile -t prd_ids < <(printf '%s' "$BRANCH_NAME" | grep -Eo 'PRD-[0-9]+' | sort -u || true)
          if [[ "${#prd_ids[@]}" -eq 0 ]]; then
            echo "::error::브랜치명에 PRD ID가 필요합니다. 예: feat/PRD-123-add-feature"
            exit 1
          fi

          pr_text="${PR_TITLE:-} ${PR_BODY:-}"
          pr_has_matching_id=0
          for prd_id in "${prd_ids[@]}"; do
            if grep -q "$prd_id" <<< "$pr_text"; then
              pr_has_matching_id=1
              break
            fi
          done

          if [[ "$pr_has_matching_id" -ne 1 ]]; then
            echo "::error::PR 제목/본문에 브랜치 PRD ID를 포함해야 합니다."
            exit 1
          fi

          scope_union=""
          for prd_id in "${prd_ids[@]}"; do
            prd_file="docs/prd/${prd_id}.md"

            if [[ ! -f "$prd_file" ]]; then
              echo "::error::PRD 파일이 없습니다: $prd_file"
              exit 1
            fi

            if ! grep -Eq "^prd_id:[[:space:]]*${prd_id}[[:space:]]*$" "$prd_file"; then
              echo "::error::${prd_file} 에 'prd_id: ${prd_id}'가 필요합니다."
              exit 1
            fi

            if ! grep -Eq "^status:[[:space:]]*approved[[:space:]]*$" "$prd_file"; then
              echo "::error::${prd_file} 는 status: approved 여야 합니다."
              exit 1
            fi

            scope_lines="$(awk '
              /^[[:space:]]*scope_modules:[[:space:]]*$/ { in_scope=1; next }
              in_scope == 1 {
                if ($0 ~ /^[[:space:]]*-[[:space:]]+/) {
                  gsub(/^[[:space:]]*-[[:space:]]+/, "", $0)
                  print $0
                  next
                }
                if ($0 ~ /^[[:space:]]*$/) { exit }
                if ($0 ~ /^[[:alnum:]_]+:[[:space:]]*/) { exit }
              }
            ' "$prd_file")"

            if [[ -n "$scope_lines" ]]; then
              scope_union+=$'\n'
              scope_union+="$scope_lines"
            fi
          done

          if [[ -z "$scope_union" ]]; then
            echo "::error::PRD에 scope_modules가 비어 있습니다."
            exit 1
          fi

          mapfile -t changed_modules < <(
            while IFS= read -r path; do
              [[ -z "$path" ]] && continue
              case "$path" in
                app/*)
                  echo "app"
                  ;;
                core/*/*)
                  IFS='/' read -r p1 p2 _ <<< "$path"
                  echo "$p1/$p2"
                  ;;
                feature/*/*/*)
                  IFS='/' read -r p1 p2 p3 _ <<< "$path"
                  echo "$p1/$p2/$p3"
                  ;;
              esac
            done <<< "$changed_files" | sort -u
          )

          if [[ "${#changed_modules[@]}" -eq 0 ]]; then
            echo "No module-scoped files found to validate scope_modules."
            exit 0
          fi

          for module in "${changed_modules[@]}"; do
            if ! grep -qx "$module" <<< "$scope_union"; then
              echo "::error::변경 모듈 '$module' 이(가) PRD scope_modules에 없습니다."
              exit 1
            fi
          done

          echo "PRD policy validation passed."
